<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Soumissions AGOR@-EMES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            padding: 2rem;
            color: #1e293b;
            max-width: 1300px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .header h1 {
            font-size: 1.8rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .header h1 i {
            color: #1e3a8a;
        }
        .token-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .token-area input {
            padding: 0.6rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9rem;
            min-width: 220px;
        }
        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            background: #1e3a8a;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }
        .btn:hover { background: #2563eb; }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #1e3a8a;
            color: #1e3a8a;
        }
        .btn-outline:hover {
            background: #1e3a8a;
            color: white;
        }
        .btn-success {
            background: #22c55e;
        }
        .btn-success:hover {
            background: #16a34a;
        }
        .stats {
            display: flex;
            gap: 2rem;
            background: white;
            padding: 1rem 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }
        .stat-item span:first-child {
            font-weight: 500;
            color: #64748b;
        }
        .stat-item span:last-child {
            font-weight: 700;
            font-size: 1.2rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 0.75rem 0.5rem;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            font-weight: 600;
            color: #475569;
        }
        td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }
        .badge {
            background: #e6f0ff;
            color: #1e3a8a;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        .mac-code {
            font-family: monospace;
            background: #f1f5f9;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        @media (max-width: 640px) {
            .header { flex-direction: column; align-items: stretch; }
            .token-area { flex-direction: column; }
            .stats { flex-direction: column; gap: 0.5rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1><i class="fas fa-database"></i> Soumissions</h1>
    <div class="token-area">
        <input type="text" id="tokenInput" placeholder="Entrez le token admin" value="my_secret_token_123456">
        <button class="btn" id="loadBtn"><i class="fas fa-sync-alt"></i> Charger</button>
        <button class="btn btn-success" id="downloadBtn"><i class="fas fa-download"></i> Télécharger JSON</button>
    </div>
</div>

<div class="stats" id="statsArea">
    <div class="stat-item"><span>Total soumissions :</span> <span id="totalCount">0</span></div>
    <div class="stat-item"><span>Stages :</span> <span id="stageCount">0</span></div>
    <div class="stat-item"><span>Formations :</span> <span id="formationCount">0</span></div>
</div>

<div class="card">
    <div id="dataContainer">
        <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <p>Entrez votre token et cliquez sur « Charger » pour voir les soumissions.</p>
        </div>
    </div>
</div>

<div class="footer">
    <i class="fas fa-lock"></i> Accès protégé – AGOR@-EMES Administration
</div>

<script>
    (function() {
        const tokenInput = document.getElementById('tokenInput');
        const loadBtn = document.getElementById('loadBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const container = document.getElementById('dataContainer');
        const totalSpan = document.getElementById('totalCount');
        const stageSpan = document.getElementById('stageCount');
        const formationSpan = document.getElementById('formationCount');

        let currentData = [];

        async function loadSubmissions() {
            const token = tokenInput.value.trim();
            if (!token) {
                alert('Veuillez entrer le token d\'administration.');
                return;
            }

            container.innerHTML = '<div style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-spin" style="font-size:2rem;"></i><p>Chargement...</p></div>';

            try {
                const response = await fetch(`/api/submissions?token=${encodeURIComponent(token)}`);
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Erreur serveur');
                }
                const data = await response.json();
                currentData = Array.isArray(data) ? data : [];
                renderData(currentData);
                updateStats(currentData);
            } catch (err) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i><p style="color:#ef4444;">Erreur : ${err.message}</p></div>`;
                currentData = [];
                updateStats([]);
            }
        }

        function renderData(data) {
            if (!data || data.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>Aucune soumission pour le moment.</p></div>`;
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nom</th>
                        <th>Prénom</th>
                        <th>Email</th>
                        <th>Type</th>
                        <th>Niveau</th>
                        <th>MAC Téléphone</th>
                        <th>MAC PC</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>`;

            data.forEach((item, index) => {
                const date = new Date(item.createdAt).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
                html += `<tr>
                    <td>${index + 1}</td>
                    <td><strong>${escapeHtml(item.nom || '')}</strong></td>
                    <td>${escapeHtml(item.prenom || '')}</td>
                    <td>${escapeHtml(item.email || '')}</td>
                    <td><span class="badge">${item.typeDemande === 'stage' ? 'Stage' : 'Formation'}</span></td>
                    <td>${escapeHtml(item.niveau || '')}</td>
                    <td><span class="mac-code">${escapeHtml(item.macTel || '')}</span></td>
                    <td>${item.macPc ? `<span class="mac-code">${escapeHtml(item.macPc)}</span>` : '-'}</td>
                    <td style="font-size:0.8rem;">${date}</td>
                </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function updateStats(data) {
            const total = data.length;
            const stages = data.filter(d => d.typeDemande === 'stage').length;
            const formations = data.filter(d => d.typeDemande === 'formation').length;
            totalSpan.textContent = total;
            stageSpan.textContent = stages;
            formationSpan.textContent = formations;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // Chargement
        loadBtn.addEventListener('click', loadSubmissions);

        // Téléchargement JSON
        downloadBtn.addEventListener('click', function() {
            if (currentData.length === 0) {
                alert('Aucune donnée à télécharger. Chargez d\'abord les soumissions.');
                return;
            }
            const jsonStr = JSON.stringify(currentData, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `soumissions_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Si un token est déjà présent, charger automatiquement
        if (tokenInput.value.trim()) {
            loadSubmissions();
        }

        // Appuyer sur Entrée dans le champ token déclenche le chargement
        tokenInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                loadBtn.click();
            }
        });

    })();
</script>

</body>
</html>
